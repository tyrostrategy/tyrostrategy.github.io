<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#1e3a5f"/>
  <title>TYRO Strategy — Çevrimdışı</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:"Plus Jakarta Sans",system-ui,sans-serif;
      background:#f8fafc;
      color:#0f172a;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      text-align:center;
      max-width:380px;
      padding:48px 32px;
      background:rgba(255,255,255,0.7);
      backdrop-filter:blur(24px) saturate(1.4);
      -webkit-backdrop-filter:blur(24px) saturate(1.4);
      border:1px solid rgba(255,255,255,0.5);
      border-radius:24px;
      box-shadow:0 4px 32px rgba(0,0,0,0.06);
    }
    .logo{margin:0 auto 24px;width:64px;height:64px;opacity:0.8}
    h1{font-size:20px;font-weight:800;color:#1e3a5f;margin-bottom:8px}
    p{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:24px}
    .btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:10px 24px;
      background:#1e3a5f;color:#fff;
      font-size:13px;font-weight:600;
      border:none;border-radius:12px;
      cursor:pointer;
      transition:transform 0.15s,box-shadow 0.15s;
    }
    .btn:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(30,58,95,0.25)}
    .btn:active{transform:scale(0.98)}
    .hint{margin-top:20px;font-size:11px;color:#94a3b8}
  </style>
</head>
<body>
  <div class="card">
    <svg class="logo" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="fg" x1="61.29" y1="116.53" x2="14.04" y2="47.15" gradientTransform="translate(0 150.55) scale(1 -1)" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#10b981"/></linearGradient></defs>
      <path d="M14.52,68.93v33.41s-.28,6.49,3.59,4.28c10.49-6.21,21.95-12.7,26.51-15.05,9.39-4.69,8.01-10.49,8.01-10.49V48.77c0-8.42-5.8-4.69-5.8-4.69l-28.16,16.15s-4.14,2.35-4.14,8.7Z" fill="url(#fg)"/>
      <path d="M97.77,70.17v40.31s1.52,10.91-7.45,15.88l-25.68,15.19s-6.9,3.31-6.49-2.76l1.66-48.73,37.96-19.88Z" fill="#6366f1"/>
      <path d="M58.15,137.95V66.72s-1.52-13.67,18.5-24.99l54.94-31.61s5.8-3.59,5.8,4.69V47.12s1.52,5.8-8.01,10.49c-9.53,4.69-47.9,27.61-47.9,27.61,0,0-23.33,11.87-23.33,52.74Z" fill="#3b82f6"/>
      <path d="M84.52,91.98s5.52-3.31,13.25-7.87v-8.28c-9.11,5.25-16.43,9.66-16.43,9.66,0,0-20.29,10.35-22.92,45.14v1.1c7.32-30.23,26.09-39.76,26.09-39.76Z" fill="#8b5cf6"/>
    </svg>
    <h1>Çevrimdışısınız</h1>
    <p>İnternet bağlantınız kesilmiş görünüyor. Bağlantınızı kontrol edip tekrar deneyin.</p>
    <button class="btn" onclick="location.reload()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      Tekrar Dene
    </button>
    <p class="hint">TYRO Strategy — Stratejik Yönetim Platformu</p>
  </div>
</body>
</html>
